
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aurum · Finanças</title>
<meta name="description" content="Aurum — seu app de finanças pessoais premium">
<meta name="theme-color" content="#f5f3ef" id="metaTheme">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aurum">
<link rel="manifest" id="pwaManifest">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS — Light (default) + Dark
═══════════════════════════════════════════ */
:root {
  --bg:        #f5f3ef;
  --bg2:       #eceae4;
  --surface:   #ffffff;
  --card:      #ffffffcc;
  --border:    rgba(0,0,0,.08);
  --border2:   rgba(0,0,0,.05);
  --text:      #1a1814;
  --text2:     #5a5650;
  --muted:     #9e9890;
  --gold:      #b8892a;
  --gold-l:    #d4a84b;
  --gold-d:    #8a6518;
  --gold-bg:   rgba(184,137,42,.1);
  --gold-glow: rgba(184,137,42,.22);
  --green:     #2d7a5f;
  --green-bg:  rgba(45,122,95,.1);
  --red:       #c0392b;
  --red-bg:    rgba(192,57,43,.1);
  --blue:      #2b6cb0;
  --blue-bg:   rgba(43,108,176,.1);
  --shadow:    0 2px 20px rgba(0,0,0,.07);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
  --glass:     rgba(255,255,255,.72);
  --glass-bdr: rgba(255,255,255,.6);
  --radius:    20px;
  --radius-sm: 14px;
  --fab-text:  #fff;
  --nav-bg:    rgba(245,243,239,.88);
  --toggle-bg: #e8e4de;
  --input-bg:  #f0ede7;
  --theme-icon: '☀️';
}
[data-theme="dark"] {
  --bg:        #0c0b10;
  --bg2:       #111019;
  --surface:   #141320;
  --card:      #1a192aaa;
  --border:    rgba(255,255,255,.07);
  --border2:   rgba(255,255,255,.04);
  --text:      #ede8e0;
  --text2:     #9490a0;
  --muted:     #5a5668;
  --gold:      #c9a84c;
  --gold-l:    #e8c97a;
  --gold-d:    #a07d30;
  --gold-bg:   rgba(201,168,76,.1);
  --gold-glow: rgba(201,168,76,.25);
  --green:     #4caf7d;
  --green-bg:  rgba(76,175,125,.1);
  --red:       #e05c5c;
  --red-bg:    rgba(224,92,92,.1);
  --blue:      #5c9ee0;
  --blue-bg:   rgba(92,158,224,.1);
  --shadow:    0 2px 20px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.6);
  --glass:     rgba(20,19,32,.75);
  --glass-bdr: rgba(255,255,255,.06);
  --fab-text:  #0c0b10;
  --nav-bg:    rgba(12,11,16,.9);
  --toggle-bg: #1e1d2a;
  --input-bg:  #1a192a;
  --theme-icon: '🌙';
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);overflow:hidden;transition:background .4s,color .4s}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* ═══════════════════════════════════════════
   ANIMATED BG ORBS
═══════════════════════════════════════════ */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;transition:all .5s}
.orb1{width:280px;height:280px;top:-80px;right:-80px;background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);animation:orbFloat 8s ease-in-out infinite}
.orb2{width:200px;height:200px;bottom:100px;left:-60px;background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);animation:orbFloat 10s ease-in-out infinite reverse}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(20px) scale(1.05)}}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header{padding:18px 22px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:var(--gold);letter-spacing:.02em}
.logo em{font-style:italic;font-weight:400}
.hdr-right{display:flex;gap:10px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-bdr);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:.25s;box-shadow:var(--shadow)}
.icon-btn:active{transform:scale(.92)}

/* ═══════════════════════════════════════════
   MONTH BAR
═══════════════════════════════════════════ */
.month-bar{padding:12px 22px 8px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;position:relative;z-index:2}
.month-bar::-webkit-scrollbar{display:none}
.mth-btn{padding:7px 16px;border-radius:40px;border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(8px);color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:.2s;white-space:nowrap;font-weight:400}
.mth-btn.active{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:500;box-shadow:0 4px 16px var(--gold-glow)}

/* ═══════════════════════════════════════════
   SCROLL AREA
═══════════════════════════════════════════ */
.scroll{flex:1;overflow-y:auto;padding:0 22px 110px;position:relative;z-index:1}
.scroll::-webkit-scrollbar{display:none}
.page{display:none}.page.active{display:block}

/* ═══════════════════════════════════════════
   BALANCE CARD — glass hero
═══════════════════════════════════════════ */
.balance-card{
  background:var(--glass);
  backdrop-filter:blur(24px);
  border:1px solid var(--glass-bdr);
  border-radius:var(--radius);
  padding:22px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow-lg);
  animation:cardIn .5s cubic-bezier(.2,0,.2,1) both;
}
.balance-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-l),transparent);opacity:.5}
.balance-card::after{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);pointer-events:none}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.bal-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.bal-value{font-family:'Playfair Display',serif;font-size:44px;font-weight:400;line-height:1;letter-spacing:-.01em;transition:color .3s}
.bal-value .currency{font-size:20px;color:var(--muted);vertical-align:super;font-family:'Outfit',sans-serif;font-weight:300;margin-right:4px}
.bal-sub{display:flex;gap:0;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.bal-item{flex:1;padding:0 4px}
.bal-item+.bal-item{border-left:1px solid var(--border)}
.bal-item-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.bal-item-value{font-size:15px;font-weight:600}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-gold{color:var(--gold)}

/* ═══════════════════════════════════════════
   BUDGET PROGRESS
═══════════════════════════════════════════ */
.budget-card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-bdr);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);animation:cardIn .5s .1s both}
.budget-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.budget-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.budget-amt{font-size:12px;font-weight:600;color:var(--gold)}
.prog-track{height:6px;background:var(--toggle-bg);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1),background .4s}
.budget-hint{font-size:10px;color:var(--muted);margin-top:6px}

/* ═══════════════════════════════════════════
   INSIGHT CARD
═══════════════════════════════════════════ */
.insight-card{background:var(--gold-bg);border:1px solid rgba(184,137,42,.2);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:12px;animation:cardIn .5s .15s both}
.insight-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.insight-text{font-size:13px;line-height:1.5;color:var(--text2)}
.insight-text strong{color:var(--text);font-weight:600}

/* ═══════════════════════════════════════════
   GRID MINI CARDS
═══════════════════════════════════════════ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mini-card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-bdr);border-radius:var(--radius-sm);padding:16px;box-shadow:var(--shadow);animation:cardIn .5s .2s both}
.mini-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px}
.mini-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.mini-value{font-size:17px;font-weight:600}

/* ═══════════════════════════════════════════
   LINE CHART
═══════════════════════════════════════════ */
.chart-card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-bdr);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);animation:cardIn .5s .25s both;overflow:hidden}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.chart-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:400}
.chart-sub{font-size:11px;color:var(--muted)}
.line-chart-wrap{position:relative;height:110px;margin:0 -4px}
svg.line-chart{width:100%;height:100%;overflow:visible}
.chart-tooltip{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:600;color:var(--text);pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:var(--shadow);white-space:nowrap;z-index:10}
.x-labels{display:flex;justify-content:space-between;margin-top:6px;padding:0 4px}
.x-label{font-size:9px;color:var(--muted);text-align:center;flex:1}

/* ═══════════════════════════════════════════
   SECTION TITLE
═══════════════════════════════════════════ */
.section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:400}
.section-link{font-size:12px;color:var(--gold);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.04em}

/* ═══════════════════════════════════════════
   TRANSACTION LIST
═══════════════════════════════════════════ */
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-wrap{position:relative;overflow:hidden;border-radius:var(--radius-sm)}
.tx-delete-bg{position:absolute;inset:0;background:var(--red-bg);display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:var(--radius-sm)}
.tx-delete-bg span{font-size:20px}
.tx{
  background:var(--glass);
  backdrop-filter:blur(12px);
  border:1px solid var(--glass-bdr);
  border-radius:var(--radius-sm);
  padding:13px 15px;
  display:flex;align-items:center;gap:12px;
  position:relative;
  z-index:1;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  touch-action:pan-y;
  box-shadow:var(--shadow);
}
.tx-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cat{font-size:11px;color:var(--muted);margin-top:2px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amt{font-size:14px;font-weight:600}
.tx-date{font-size:10px;color:var(--muted);margin-top:2px}
.tx-recur{font-size:9px;color:var(--gold);margin-top:2px;letter-spacing:.04em}
.empty-state{text-align:center;padding:36px 16px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
.empty-text{font-size:13px}

/* ═══════════════════════════════════════════
   DONUT CHART
═══════════════════════════════════════════ */
.donut-row{display:flex;align-items:center;gap:16px;margin-top:12px}
.donut-svg{width:110px;height:110px;flex-shrink:0;transform:rotate(-90deg)}
.legend{flex:1;display:flex;flex-direction:column;gap:9px}
.leg-item{display:flex;align-items:center;gap:8px}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.leg-name{font-size:12px;color:var(--text2);flex:1}
.leg-pct{font-size:11px;font-weight:600;color:var(--text)}

/* ═══════════════════════════════════════════
   GOALS
═══════════════════════════════════════════ */
.goal-card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-bdr);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.goal-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.goal-emoji{font-size:24px}
.goal-info{flex:1}
.goal-name{font-size:14px;font-weight:600}
.goal-sub{font-size:11px;color:var(--muted);margin-top:2px}
.goal-pct-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--gold-bg);color:var(--gold)}
.goal-prog-track{height:8px;background:var(--toggle-bg);border-radius:99px;overflow:hidden}
.goal-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold-l));border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.goal-amounts{display:flex;justify-content:space-between;margin-top:6px}
.goal-amt-label{font-size:10px;color:var(--muted)}
.goal-btn-row{display:flex;gap:8px;margin-top:12px}
.goal-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text2);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:.2s}
.goal-btn.primary{background:var(--gold-bg);border-color:rgba(184,137,42,.3);color:var(--gold);font-weight:500}
.goal-btn:active{opacity:.75}

/* ═══════════════════════════════════════════
   RECURRENTS
═══════════════════════════════════════════ */
.recur-card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-bdr);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.recur-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.recur-info{flex:1}
.recur-name{font-size:14px;font-weight:500}
.recur-day{font-size:11px;color:var(--muted);margin-top:2px}
.recur-amt{font-size:14px;font-weight:600}
.recur-del{width:28px;height:28px;border-radius:8px;background:var(--red-bg);border:none;color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ═══════════════════════════════════════════
   HISTORY BAR CHART (6 months)
═══════════════════════════════════════════ */
.hist-bars{display:flex;align-items:flex-end;gap:8px;height:100px;margin-top:12px}
.hbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.hbar{width:100%;border-radius:6px 6px 3px 3px;min-height:4px;transition:height .9s cubic-bezier(.4,0,.2,1);position:relative}
.hbar-lbl{font-size:9px;color:var(--muted);letter-spacing:.04em}
.hbar-val{font-size:8px;color:var(--muted);margin-top:2px}

/* ═══════════════════════════════════════════
   BOTTOM NAV — glass
═══════════════════════════════════════════ */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  max-width:430px;margin:0 auto;
  background:var(--nav-bg);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--glass-bdr);
  display:flex;justify-content:space-around;
  padding:10px 0 max(16px,env(safe-area-inset-bottom));
  z-index:20;
  transition:background .4s;
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 20px;position:relative}
.nav-icon{width:22px;height:22px;color:var(--muted);transition:.2s;display:flex;align-items:center;justify-content:center}.nav-icon svg{width:22px;height:22px;stroke:currentColor}
.nav-btn.active .nav-icon{color:var(--gold)}
.nav-pip{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;transition:.2s;margin-top:1px}
.nav-btn.active .nav-pip{opacity:1}
.nav-label{font-size:8px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.nav-btn.active .nav-label{color:var(--gold)}

/* ═══════════════════════════════════════════
   FAB — animated
═══════════════════════════════════════════ */
.fab-wrap{position:absolute;bottom:82px;right:22px;z-index:25}
.fab{width:54px;height:54px;border-radius:50%;background:var(--gold);border:none;color:var(--fab-text);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px var(--gold-glow);transition:.25s;position:relative;z-index:2}
.fab:active{transform:scale(.92)}
.fab-icon{font-size:26px;line-height:1;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.fab.open .fab-icon{transform:rotate(45deg)}
.fab-menu{position:absolute;bottom:64px;right:0;display:flex;flex-direction:column;gap:8px;align-items:flex-end;opacity:0;pointer-events:none;transition:.25s cubic-bezier(.4,0,.2,1);transform:translateY(10px)}
.fab-menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
.fab-item{display:flex;align-items:center;gap:10px;white-space:nowrap}
.fab-item-label{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 14px;font-size:13px;font-weight:500;box-shadow:var(--shadow);color:var(--text)}
.fab-sub{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;box-shadow:var(--shadow);transition:.2s}
.fab-sub:active{transform:scale(.9)}

/* ═══════════════════════════════════════════
   MODAL — glass drawer
═══════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);
  border:1px solid var(--glass-bdr);
  border-radius:28px 28px 0 0;
  padding:0;
  width:100%;max-width:430px;
  transform:translateY(100%);
  transition:.35s cubic-bezier(.4,0,.2,1);
  max-height:88dvh;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,.2);
}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:14px auto 0}
.modal-scroll{overflow-y:auto;padding:20px 22px 32px;flex:1}
.modal-scroll::-webkit-scrollbar{display:none}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:20px;color:var(--text)}
.type-row{display:flex;gap:8px;margin-bottom:16px;background:var(--toggle-bg);padding:4px;border-radius:14px}
.type-btn{flex:1;padding:10px;border-radius:11px;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:.25s;color:var(--muted);font-weight:500}
.type-btn.sel-exp{background:var(--surface);color:var(--red);box-shadow:var(--shadow)}
.type-btn.sel-inc{background:var(--surface);color:var(--green);box-shadow:var(--shadow)}
.field{margin-bottom:14px}
.field label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--input-bg);border:1.5px solid transparent;border-radius:13p
